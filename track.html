<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Your Order - Lanica</title>
    <meta name="description" content="Track your Lanica furniture order and see estimated delivery times." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
        .tracking-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tracking-form {
            background: var(--clr-white);
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 30px;
        }

        .order-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--clr-gray-light);
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .track-btn {
            width: 100%;
            padding: 15px;
            background: var(--clr-yellow);
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--clr-text-main);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .track-btn:hover {
            background: var(--clr-yellow-hover);
            transform: translateY(-2px);
        }

        .order-details {
            background: var(--clr-white);
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            display: none;
        }

        .status-timeline {
            margin-top: 30px;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 30px;
            bottom: -25px;
            width: 2px;
            background: var(--clr-gray-light);
        }

        .timeline-item:last-child::before {
            display: none;
        }

        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--clr-gray-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-icon.completed {
            background: var(--clr-yellow);
            color: var(--clr-text-main);
        }

        .timeline-icon.current {
            background: var(--clr-yellow);
            color: var(--clr-text-main);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(252, 213, 53, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(252, 213, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(252, 213, 53, 0); }
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--clr-text-main);
            margin-bottom: 8px;
        }

        .timeline-description {
            color: var(--clr-text-muted);
            line-height: 1.6;
        }

        .delivery-estimate {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-top: 30px;
            text-align: center;
        }

        .delivery-estimate h3 {
            color: var(--clr-text-main);
            margin-bottom: 15px;
        }

        .delivery-dates {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 15px;
        }

        .delivery-date {
            text-align: center;
        }

        .delivery-date-label {
            font-size: 0.9rem;
            color: var(--clr-text-muted);
            margin-bottom: 5px;
        }

        .delivery-date-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--clr-yellow);
        }

        .delivery-days {
            font-size: 0.9rem;
            color: var(--clr-text-muted);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .tracking-container {
                margin: 20px auto;
                padding: 15px;
            }

            .tracking-form {
                padding: 20px;
            }

            .delivery-dates {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">Lanica.</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="track.html">Track Order</a>
        </nav>
    </header>

    <main class="tracking-container">
        <div class="tracking-header">
            <h1>Track Your Order</h1>
            <p>Enter your order ID to see current status and estimated delivery time</p>
        </div>

        <div class="tracking-form">
            <input
                type="text"
                id="order-id-input"
                class="order-input"
                placeholder="Enter your Order ID (e.g., ORD-2024-001)"
                maxlength="50"
            />
            <button id="track-order-btn" class="track-btn">Track Order</button>
        </div>

        <div id="order-details" class="order-details">
            <!-- Order details will be displayed here -->
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            <!-- Error messages will be displayed here -->
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div style="font-size: 1.1rem; color: var(--clr-text-muted);">Tracking your order...</div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">
                <h2>Lanica.</h2>
                <p>Bringing modern design into your reality.</p>
            </div>
            <div class="footer-links">
                <a href="https://facebook.com" target="_blank" class="fb-contact">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.26h3.32l-.53 3.5h-2.8V24C19.62 23.1 24 18.1 24 12.07z"/>
                    </svg>
                    Contact Us
                </a>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            collection,
            query,
            where,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb2kDAVp9N_afxgOw5hSzDIvQ3UAIZVNU",
            authDomain: "jobsync-745a6.firebaseapp.com",
            projectId: "jobsync-745a6",
            storageBucket: "jobsync-745a6.firebasestorage.app",
            messagingSenderId: "845585113791",
            appId: "1:845585113791:web:921482be545bb9604ddc0a",
            measurementId: "G-LQ41PCS4HD",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DOM elements
        const orderIdInput = document.getElementById('order-id-input');
        const trackBtn = document.getElementById('track-order-btn');
        const orderDetails = document.getElementById('order-details');
        const errorMessage = document.getElementById('error-message');
        const loading = document.getElementById('loading');

        // Track order button click handler
        trackBtn.addEventListener('click', async () => {
            const orderId = orderIdInput.value.trim();

            if (!orderId) {
                showError('Please enter an Order ID');
                return;
            }

            showLoading(true);
            hideError();
            hideOrderDetails();

            try {
                const orderDoc = await getDoc(doc(db, 'orders', orderId));

                if (!orderDoc.exists()) {
                    showError('Order not found. Please check your Order ID and try again.');
                    return;
                }

                const order = orderDoc.data();
                displayOrderDetails(order, orderId);

            } catch (error) {
                console.error('Error tracking order:', error);
                showError('Unable to track order. Please try again later.');
            } finally {
                showLoading(false);
            }
        });

        // Allow Enter key to submit
        orderIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                trackBtn.click();
            }
        });

        function displayOrderDetails(order, orderId) {
            const status = normalizeOrderStatus(order.status);
            const deliveryEstimate = calculateDeliveryEstimate(order);

            const orderHTML = `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: var(--clr-text-main); margin-bottom: 15px;">Order Details</h2>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px;">
                        <div>
                            <strong>Order ID:</strong><br>
                            <span style="color: var(--clr-text-muted);">${orderId}</span>
                        </div>
                        <div>
                            <strong>Order Date:</strong><br>
                            <span style="color: var(--clr-text-muted);">${formatDate(order.createdAt)}</span>
                        </div>
                        <div>
                            <strong>Total:</strong><br>
                            <span style="color: var(--clr-text-muted);">₱${Number(order.total || order.totalAmount || 0).toLocaleString()}</span>
                        </div>
                        <div>
                            <strong>Status:</strong><br>
                            <span class="order-status-badge order-status-${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
                        </div>
                    </div>
                </div>

                ${deliveryEstimate ? `
                <div class="delivery-estimate">
                    <h3>📦 Estimated Delivery</h3>
                    <div class="delivery-dates">
                        <div class="delivery-date">
                            <div class="delivery-date-label">Earliest</div>
                            <div class="delivery-date-value">${deliveryEstimate.minDate}</div>
                        </div>
                        <div class="delivery-date">
                            <div class="delivery-date-label">Latest</div>
                            <div class="delivery-date-value">${deliveryEstimate.maxDate}</div>
                        </div>
                    </div>
                    <div class="delivery-days">${deliveryEstimate.daysRange} business days</div>
                </div>
                ` : ''}

                <div class="status-timeline">
                    <h3 style="margin-bottom: 25px; color: var(--clr-text-main);">Order Status</h3>
                    ${getStatusTimeline(status, deliveryEstimate)}
                </div>
            `;

            orderDetails.innerHTML = orderHTML;
            orderDetails.style.display = 'block';
        }

        function getLocationBasedDeliveryTimes(address) {
            if (!address) {
                return { min: 3, max: 5 }; // Default for unknown locations
            }

            const addressString = typeof address === 'string' ? address.toLowerCase() :
                (address.city || address.province || address.municipality || '').toLowerCase();

            // Define delivery zones based on location (same as staff.js)
            const deliveryZones = {
                // Local areas - fastest delivery
                'pila': { min: 1, max: 2 },
                'calamba': { min: 1, max: 2 },
                'cabuyao': { min: 1, max: 2 },
                'binan': { min: 1, max: 2 },
                'santa rosa': { min: 1, max: 2 },

                // Nearby Laguna cities - moderate delivery
                'san pedro': { min: 2, max: 3 },
                'los baños': { min: 2, max: 3 },
                'bay': { min: 2, max: 3 },
                'calauan': { min: 2, max: 3 },
                'liliw': { min: 2, max: 3 },
                'nagcarlan': { min: 2, max: 3 },
                'rizal': { min: 2, max: 3 },
                'magdalena': { min: 2, max: 3 },
                'luisiana': { min: 2, max: 3 },
                'majayjay': { min: 2, max: 3 },
                'pagsanjan': { min: 2, max: 3 },
                'paete': { min: 2, max: 3 },
                'kalayaan': { min: 2, max: 3 },
                'cavinti': { min: 2, max: 3 },

                // Metro Manila - standard delivery
                'manila': { min: 2, max: 3 },
                'quezon city': { min: 2, max: 3 },
                'makati': { min: 2, max: 3 },
                'pasig': { min: 2, max: 3 },
                'taguig': { min: 2, max: 3 },
                'mandaluyong': { min: 2, max: 3 },
                'san juan': { min: 2, max: 3 },
                'pasay': { min: 2, max: 3 },
                'paranaque': { min: 2, max: 3 },
                'muntinlupa': { min: 2, max: 3 },
                'las pinas': { min: 2, max: 3 },
                'marikina': { min: 2, max: 3 },
                'malabon': { min: 2, max: 3 },
                'navotas': { min: 2, max: 3 },
                'valenzuela': { min: 2, max: 3 },
                'caloocan': { min: 2, max: 3 },

                // Provincial areas - longer delivery
                'batangas city': { min: 3, max: 5 },
                'lipa': { min: 3, max: 5 },
                'tanauan': { min: 3, max: 5 },
                'sto. tomas': { min: 3, max: 5 },
                'bauan': { min: 3, max: 5 },
                'san jose': { min: 3, max: 5 },
                'cuenca': { min: 3, max: 5 },
                'alitagtag': { min: 3, max: 5 },
                'balayan': { min: 3, max: 5 },
                'calaca': { min: 3, max: 5 },
                'lemery': { min: 3, max: 5 },
                'taal': { min: 3, max: 5 },
                'san luis': { min: 3, max: 5 },
                'san pascual': { min: 3, max: 5 },
                'san nicolas': { min: 3, max: 5 },
                'tingloy': { min: 3, max: 5 },

                // Quezon Province
                'lucena': { min: 3, max: 5 },
                'sariaya': { min: 3, max: 5 },
                'tayabas': { min: 3, max: 5 },
                'candelaria': { min: 3, max: 5 },
                'dolores': { min: 3, max: 5 },
                'tiaong': { min: 3, max: 5 },
                'san antonio': { min: 3, max: 5 },
                'padre burgos': { min: 3, max: 5 },
                'agdangan': { min: 3, max: 5 },
                'unisan': { min: 3, max: 5 }
            };

            // Find matching location
            for (const [location, timeRange] of Object.entries(deliveryZones)) {
                if (addressString.includes(location)) {
                    return timeRange;
                }
            }

            // Default for unknown locations
            return { min: 3, max: 5 };
        }

        function calculateDeliveryEstimate(order) {
            const now = new Date();
            const status = normalizeOrderStatus(order.status);

            // Use stored estimates if available (manual override takes priority)
            if (order.estimatedDeliveryMin && order.estimatedDeliveryMax) {
                const isManual = order.manualOverrideApplied || order.estimatedDeliveryDays === 'Custom';
                return {
                    minDate: order.estimatedDeliveryMin,
                    maxDate: order.estimatedDeliveryMax,
                    daysRange: order.estimatedDeliveryDays || '3-5',
                    isManual: isManual,
                    location: order.shippingAddress || order.deliveryAddress || order.address || ''
                };
            }

            // Get customer address for location-based calculation
            const customerAddress = order.shippingAddress || order.deliveryAddress || order.address || '';

            // Base delivery times by status
            const statusMultipliers = {
                accepted: 1.0,
                processing: 0.8,
                shipped: 0.6,
                delivered: 0
            };

            // Get location-based delivery times
            const locationTimes = getLocationBasedDeliveryTimes(customerAddress);
            const multiplier = statusMultipliers[status] || 1.0;

            // Calculate adjusted delivery times
            const minDays = Math.ceil(locationTimes.min * multiplier);
            const maxDays = Math.ceil(locationTimes.max * multiplier);

            const minDeliveryDate = new Date(now.getTime() + (minDays * 24 * 60 * 60 * 1000));
            const maxDeliveryDate = new Date(now.getTime() + (maxDays * 24 * 60 * 60 * 1000));

            // Skip weekends
            const addWeekendBuffer = (date) => {
                const day = date.getDay();
                if (day === 0) { // Sunday
                    return new Date(date.getTime() + (24 * 60 * 60 * 1000));
                }
                return date;
            };

            const adjustedMinDate = addWeekendBuffer(minDeliveryDate);
            const adjustedMaxDate = addWeekendBuffer(maxDeliveryDate);

            const formatDate = (date) => {
                return date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
            };

            return {
                minDate: formatDate(adjustedMinDate),
                maxDate: formatDate(adjustedMaxDate),
                daysRange: `${minDays}-${maxDays}`,
                isManual: false,
                location: customerAddress
            };
        }

        function getStatusTimeline(status, deliveryEstimate) {
            const timelines = {
                accepted: {
                    icon: '📋',
                    title: 'Order Accepted',
                    description: 'Your order has been received and is being processed.'
                },
                processing: {
                    icon: '⚙️',
                    title: 'Processing',
                    description: 'Your order is being prepared for shipment.'
                },
                shipped: {
                    icon: '🚚',
                    title: 'Shipped',
                    description: 'Your order is on the way!'
                },
                delivered: {
                    icon: '✅',
                    title: 'Delivered',
                    description: 'Your order has been delivered successfully.'
                }
            };

            const currentStatus = timelines[status] || timelines.accepted;
            const statusKeys = Object.keys(timelines);
            const currentIndex = statusKeys.indexOf(status);

            return statusKeys.map((key, index) => {
                const item = timelines[key];
                const isCompleted = index < currentIndex;
                const isCurrent = index === currentIndex;

                return `
                    <div class="timeline-item">
                        <div class="timeline-icon ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}">
                            ${item.icon}
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-title">${item.title}</div>
                            <div class="timeline-description">${item.description}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function normalizeOrderStatus(raw) {
            if (raw == null) return "pending";
            const s = String(raw).toLowerCase().trim();
            if (
                s === "pending" ||
                s === "accepted" ||
                s === "processing" ||
                s === "shipped" ||
                s === "delivered" ||
                s === "declined" ||
                s === "completed" ||
                s === "received"
            ) {
                return s;
            }
            return "pending";
        }

        function formatDate(timestamp) {
            if (!timestamp) return '—';

            if (timestamp.toDate) {
                return timestamp.toDate().toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            if (timestamp.seconds) {
                return new Date(timestamp.seconds * 1000).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            return '—';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function hideOrderDetails() {
            orderDetails.style.display = 'none';
        }

        function showLoading(show) {
            loading.style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
