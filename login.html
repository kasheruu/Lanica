<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanica | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-body">
    <div class="login-container">
      <div class="login-card">
        <h1 class="logo">Lanica.</h1>
        <p class="login-subtitle">Admin / Staff Access</p>
        <div id="login-error" class="error-msg" aria-live="polite"></div>

        <div id="login-form-wrapper">
          <form id="login-form">
            <div class="form-group">
              <label for="admin-email">Email Address</label>
              <input type="email" id="admin-email" required placeholder="admin@lanica.com" autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="admin-pwd">Password</label>
              <input
                type="password"
                id="admin-pwd"
                required
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
            <!-- Widget rendered by recaptcha-init.js using LANICA_RECAPTCHA_SITE_KEY in recaptcha-config.js -->
            <div class="form-group recaptcha-row">
              <div id="login-recaptcha"></div>
            </div>
            <button type="submit" class="btn-primary login-btn">Sign In</button>
          </form>
        </div>

        <div id="verification-pending" class="verification-panel is-hidden">
          <p class="verification-title">Verify your email</p>
          <p class="verification-lead">
            Sign-in is blocked until you confirm your address. We sent a link to:
          </p>
          <p class="verification-email-line"><strong id="verification-email"></strong></p>
          <p class="verification-hint">
            Open the email and click <strong>Verify</strong>, then return here and use <strong>Sign out</strong> below,
            or refresh this page after verifying.
          </p>
          <button type="button" class="btn-secondary verification-action" id="resend-verification-btn">
            Resend verification email
          </button>
          <button type="button" class="btn-outline verification-action" id="sign-out-pending-btn">Sign out</button>
        </div>

        <a href="index.html" class="back-link">Return to Home</a>
      </div>
    </div>
    <script src="recaptcha-config.js"></script>
    <script src="recaptcha-init.js"></script>
    <script
      src="https://www.google.com/recaptcha/api.js?onload=onLanicaRecaptchaLoad&render=explicit"
      async
      defer
    ></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
